name: storify
description: "Inventarverwaltungs-App mit Strichcode-Erfassung – cikle"
publish_to: 'none'
version: 1.1.3+13

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # HTTP REST API
  http: ^1.2.1

  # Barcode/QR Scanner
  mobile_scanner: ^5.2.3

  # Local storage / Offline cache
  shared_preferences: ^2.2.3

  # UI / Fonts
  google_fonts: ^8.0.0

  # Camera permissions
  permission_handler: ^11.3.1

  # Open URLs in system browser (used for update download link)
  url_launcher: ^6.3.0

  # Connectivity + Offline sync
  connectivity_plus: ^6.0.3

  # Local push notifications (low-stock alerts)
  flutter_local_notifications: ^17.2.2

  # Export / Import
  csv: ^6.0.0
  pdf: ^3.11.0
  printing: ^5.12.0
  file_picker: ^8.1.2
  share_plus: ^10.0.2
  path_provider: ^2.1.3

  # Localization
  intl: ^0.20.2

  # Read app version from pubspec.yaml at runtime
  package_info_plus: ^8.0.0

  # Photo picker (camera + gallery) for optional item photos
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/icon/
    - assets/splash/
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/storify_logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0E1016"
  adaptive_icon_foreground: "assets/images/storify_logo.png"

flutter_native_splash:
  color: "#0E1016"
  image: assets/splash/splash_logo.png
  color_dark: "#0E1016"
  image_dark: assets/splash/splash_logo.png
