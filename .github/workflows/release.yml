name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get
        working-directory: storify

      - name: Build APK
        run: flutter build apk --release
        working-directory: storify

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Storify ${{ github.ref_name }}
          files: storify/build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
